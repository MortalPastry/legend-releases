name: Question
description: Ask how something works, or whether Legend can do a thing.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [FAQ](https://github.com/MortalPastry/legend-releases#faq) first —
        it may already answer this. If not, ask away.
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Legend version (if relevant)
      placeholder: e.g. 0.1.0
